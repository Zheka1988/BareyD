<form hx-post="{% url 'objects:add_object' %}"
      hx-target="#modal-content"
      hx-swap="innerHTML"
      class="space-y-4">
    {% csrf_token %}

    <div>
        <label class="block text-sm font-medium">Название</label>
        <input type="text" name="name" required
               class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium">Широта</label>
            <input type="number" step="any" name="lat" required
                   class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
        </div>
        <div>
            <label class="block text-sm font-medium">Долгота</label>
            <input type="number" step="any" name="lng" required
                   class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
        </div>
    </div>

    <div>
        <label class="block text-sm font-medium">Краткое название</label>
        <input type="text" name="short_name"
               class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
    </div>

    <div>
        <label class="block text-sm font-medium">Описание</label>
        <textarea name="description" rows="3"
                  class="mt-1 block w-full border-gray-300 rounded-md shadow-sm"></textarea>
    </div>

    <!-- Выпадающие списки -->
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium">Страна</label>
            <select name="country_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                <option value="">— Не выбрано —</option>
                {% for c in countries %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium">Гос. орган</label>
            <select name="gov_org_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                <option value="">— Не выбрано —</option>
                {% for g in gov_orgs %}
                    <option value="{{ g.id }}">{{ g.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium">Тип сил</label>
            <select name="type_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                <option value="">— Не выбрано —</option>
                {% for t in force_types %}
                    <option value="{{ t.id }}">{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium">Вид сил</label>
            <select name="kind_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                <option value="">— Не выбрано —</option>
                {% for k in force_kinds %}
                    <option value="{{ k.id }}">{{ k.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium">Ассоциация</label>
            <select name="association_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                <option value="">— Не выбрано —</option>
                {% for a in associations %}
                    <option value="{{ a.id }}">{{ a.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium">Часть</label>
            <select name="unit_id" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm">
                <option value="">— Не выбрано —</option>
                {% for u in units %}
                    <option value="{{ u.id }}">{{ u.name }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="flex justify-end space-x-3 mt-6">
        <button type="button" @click="$dispatch('close-modal')"
                class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">
            Отмена
        </button>
        <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
            Сохранить
        </button>
    </div>
</form>
