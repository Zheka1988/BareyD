{% extends "base.html" %}

{% block title %}Объекты — карта и дерево{% endblock %}

{% block content %}

<div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
    <!-- Левая колонка — дерево -->
    <div class="lg:col-span-1 bg-gray-100 p-4 rounded">
        <h2 class="text-xl font-bold mb-4">Иерархия</h2>

        <!-- Контейнер для jstree (пока оставляем как было) -->
        <div id="jstree"
             hx-get="{% url 'objects:tree' %}"
             hx-trigger="load"
             hx-swap="innerHTML">
            <!-- Здесь появится дерево после загрузки -->
            Загрузка дерева...
        </div>
    </div>

    <!-- Правая колонка — карта -->
    <div class="lg:col-span-3">
        <h2 class="text-xl font-bold mb-4">Карта объектов</h2>
        <div id="map" style="height: 700px;" class="border rounded"></div>
    </div>
</div>

<!-- Модальное окно для добавления объекта (пример с Alpine) -->
<div x-data="{ open: false }" @open-modal.window="open = true" @close-modal.window="open = false">
    <button @click="open = true" class="bg-blue-600 text-white px-4 py-2 rounded">
        Добавить объект
    </button>

    <div x-show="open" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-lg mx-4" @click.outside="open = false">
            <div id="modal-content"
                 hx-get="{% url 'objects:add_object_form' %}"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <!-- Здесь загрузится форма -->
                Загрузка...
            </div>
        </div>
    </div>
</div>

{% endblock %}


{% block extra_js %}
<script>
    // Инициализация Leaflet
    var map = L.map('map').setView([51.505, -0.09], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Функция обновления маркеров (будем вызывать из js)
    function loadMarkers(url = "{% url 'objects:markers' %}") {
        fetch(url)
            .then(r => r.json())
            .then(data => {
                // Очищаем старые маркеры (если есть слой)
                if (window.markersLayer) markersLayer.clearLayers();
                window.markersLayer = L.layerGroup().addTo(map);

                data.forEach(m => {
                    if (m.lat && m.lng) {
                        L.marker([m.lat, m.lng])
                            .addTo(markersLayer)
                            .bindPopup(m.name + '<br>' + (m.description || ''))
                            .on('click', () => {
                                // Выделить в дереве
                                if (m.tree_node_id) {
                                    $('#jstree').jstree(true).select_node(m.tree_node_id);
                                }
                            });
                    }
                });
            });
    }

    // Загружаем маркеры при старте
    document.addEventListener('DOMContentLoaded', () => loadMarkers());

    // Слушаем события от HTMX
    document.body.addEventListener('htmx:afterSwap', (evt) => {
        if (evt.detail.target.id === 'jstree') {
            initJsTree();
        }
    });

    // Инициализация jstree
    function initJsTree() {
        $('#jstree').jstree("destroy"); // Сбрасываем старое если есть
        $('#jstree').jstree({
            "core": { "themes": { "stripes": true } },
            "plugins": ["wholerow", "contextmenu"]
        }).on('select_node.jstree', (e, data) => {
            let node_id = data.node.id;
            loadMarkers(`{% url 'objects:markers' %}?node_id=${node_id}`);
        });
    }

    // Слушаем событие успешного добавления объекта
    document.body.addEventListener('objectAdded', () => {
        // Закрываем модальное окно через событие Alpine.js
        window.dispatchEvent(new CustomEvent('close-modal'));
        
        // Перезагружаем дерево (HTMX)
        htmx.trigger('#jstree', 'load');
        
        // Перезагружаем маркеры
        loadMarkers();
    });
</script>
{% endblock %}
